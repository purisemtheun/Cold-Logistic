<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำสั่งขนส่ง - ColdFast Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f0f2f5; --surface: #ffffff; --sidebar-bg: #1a2332; --sidebar-active: #243447;
            --sidebar-text: #8fa3bc; --sidebar-text-active: #e8edf3; --accent: #2563a8;
            --text-primary: #1c2b3a; --text-muted: #8fa3bc; --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --radius-lg: 14px;
        }
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text-primary); display: flex; min-height: 100vh; font-size: 14px; }
        h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
        
        .sidebar { width: 240px; min-height: 100vh; background: var(--sidebar-bg); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; border-right: 1px solid #111827; }
        .sidebar-logo { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #2563a8, #4a8fd4); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .logo-text { font-size: 16px; font-weight: 600; color: #ffffff; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.5px; }
        .logo-sub { font-size: 11px; color: var(--sidebar-text); letter-spacing: 0.5px; }
        .nav-section { padding: 24px 0; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: #4a6680; padding: 0 24px 8px; text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: var(--sidebar-text); text-decoration: none; transition: 0.2s; border-left: 3px solid transparent; font-size: 14px; font-weight: 500; }
        .nav-item:hover { color: var(--sidebar-text-active); background: rgba(255,255,255,0.04); }
        .nav-item.active { color: var(--sidebar-text-active); background: var(--sidebar-active); border-left-color: #4a8fd4; }
        .nav-icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .back-btn { display: flex; align-items: center; gap: 12px; color: var(--sidebar-text); font-size: 14px; text-decoration: none; transition: 0.2s; font-weight: 500; }
        .back-btn:hover { color: var(--sidebar-text-active); }

        .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); z-index: 50; }
        .topbar-title { font-size: 16px; font-weight: 600; }
        
        .content { padding: 30px 32px; flex: 1; }
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .table-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f8fafc; padding: 16px; text-align: left; font-size: 13px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fcfcfd; }
        
        .id-text { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--accent); }
        
        .status-select { padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; font-family: 'IBM Plex Sans Thai'; cursor: pointer; outline: none; font-weight: 500;}
        .status-pending { background: #fffbeb; color: #b45309; border-color: #fde68a; }
        .status-transit { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
        .status-completed { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
        .status-cancelled { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }

        .btn-action { background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.7; transition: 0.2s; margin-right: 8px;}
        .btn-action:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">❄️</div><div><div class="logo-text">ColdFast</div><div class="logo-sub">Logistics</div></div></div>
        <nav class="nav-section">
            <div class="nav-label">เมนูหลัก</div>
            <a class="nav-item" href="pos.html"><span class="nav-icon">📦</span> ส่งของ</a>
            <a class="nav-item active" href="orders.html"><span class="nav-icon">📋</span> คำสั่งขนส่งทั้งหมด</a>
            <a class="nav-item" href="dashboard.html"><span class="nav-icon">📊</span> แดชบอร์ดสรุปผล</a>
            <a class="nav-item" href="payroll.html"><span class="nav-icon">💰</span> ระบบเงินเดือน</a>
            <a class="nav-item" href="crm.html"><span class="nav-icon">🤝</span> จัดการลูกค้า (CRM)</a>
        </nav>
        <div class="sidebar-footer"><a class="back-btn" href="index.html"><span class="nav-icon">⬅️</span> กลับหน้าแรก</a></div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-title">ระบบจัดการขนส่งวัตถุดิบแบบเย็น</div>
        </header>

        <div class="content">
            <div class="header-action">
                <h2>รายการคำสั่งขนส่งทั้งหมด</h2>
                <button onclick="clearAll()" style="color: #b91c1c; background: #fee2e2; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: 'IBM Plex Sans Thai'; font-weight: 500; font-size: 14px;">ล้างประวัติทั้งหมด</button>
            </div>
            
            <div class="table-card">
                <table>
                    <thead>
                        <tr><th>ID</th><th>วันที่</th><th>ลูกค้า</th><th>สินค้า</th><th>ยอดสุทธิ</th><th>สถานะสินค้า</th><th>จัดการ</th></tr>
                    </thead>
                    <tbody id="order-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ข้อมูลตัวอย่างสำหรับ 4 ออเดอร์
        const defaultOrders = [
            { id: "OD001", date: "12/03/2026", supplier: "บริษัทจัดหาวัตถุดิบ", customer: "ร้านสเต็กพี่หมี", product: "เนื้อวัวพรีเมียม", weight: "50", temp: "แช่แข็ง (+70฿)", total: "4,290 ฿", distance: "0-50 กม.", address: "กรุงเทพฯ", status: "Completed" },
            { id: "OD002", date: "12/03/2026", supplier: "บริษัท A", customer: "คาเฟ่แมวเหมียว", product: "เค้กและเบเกอรี่", weight: "15", temp: "แช่เย็น (+40฿)", total: "1,460 ฿", distance: "0-50 กม.", address: "นนทบุรี", status: "In Transit" },
            { id: "OD003", date: "13/03/2026", supplier: "บริษัทจัดหาวัตถุดิบ", customer: "โรงแรมแกรนด์", product: "อาหารทะเลสด", weight: "100", temp: "แช่แข็ง (+70฿)", total: "8,290 ฿", distance: "51-100 กม.", address: "ชลบุรี", status: "Pending" },
            { id: "OD004", date: "13/03/2026", supplier: "บริษัท B", customer: "ร้านไอศกรีมลุงหนวด", product: "ไอศกรีม", weight: "30", temp: "แช่แข็ง (+70฿)", total: "2,690 ฿", distance: "0-50 กม.", address: "ปทุมธานี", status: "Pending" }
        ];

        function loadOrders() {
            // เช็กว่ามีข้อมูลในระบบหรือยัง ถ้าไม่มีให้ใช้ข้อมูลตัวอย่าง
            let orders = JSON.parse(localStorage.getItem('allOrders'));
            if (!orders || orders.length === 0) {
                orders = defaultOrders;
                localStorage.setItem('allOrders', JSON.stringify(orders));
            }

            const tbody = document.getElementById('order-list');
            if(orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px; color:#8fa3bc;">ไม่มีข้อมูลคำสั่งขนส่ง</td></tr>';
                return;
            }
            
            tbody.innerHTML = orders.map((o, i) => {
                let statusClass = 'status-pending';
                if(o.status === 'In Transit') statusClass = 'status-transit';
                if(o.status === 'Completed') statusClass = 'status-completed';
                if(o.status === 'Cancelled') statusClass = 'status-cancelled';

                return `
                <tr>
                    <td class="id-text">${o.id}</td>
                    <td>${o.date}</td>
                    <td>${o.customer}</td>
                    <td>${o.product}</td>
                    <td style="font-weight:600;">${o.total}</td>
                    <td>
                        <select class="status-select ${statusClass}" onchange="updateStatus(${i}, this)">
                            <option value="Pending" ${o.status==='Pending'?'selected':''}>🟠 รอดำเนินการ</option>
                            <option value="In Transit" ${o.status==='In Transit'?'selected':''}>🔵 ออกจากบริษัท</option>
                            <option value="Completed" ${o.status==='Completed'?'selected':''}>🟢 เสร็จสิ้น</option>
                            <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>🔴 ยกเลิก</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-action" onclick="viewBill('${o.id}')" title="ดูบิล">📄</button>
                        <button class="btn-action" onclick="deleteOrder(${i})" title="ลบ">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function updateStatus(index, sel) {
            const orders = JSON.parse(localStorage.getItem('allOrders'));
            orders[index].status = sel.value;
            localStorage.setItem('allOrders', JSON.stringify(orders));
            loadOrders(); 
        }

        function viewBill(id) {
            const orders = JSON.parse(localStorage.getItem('allOrders'));
            const order = orders.find(o => o.id === id);
            sessionStorage.setItem('currentOrder', JSON.stringify(order));
            window.location.href = 'invoice.html';
        }

        function deleteOrder(i) {
            if(confirm('ยืนยันการลบคำสั่งนี้?')) {
                const orders = JSON.parse(localStorage.getItem('allOrders'));
                orders.splice(i, 1);
                localStorage.setItem('allOrders', JSON.stringify(orders));
                loadOrders();
            }
        }
        
        function clearAll() {
            if(confirm('ต้องการลบประวัติทั้งหมดใช่หรือไม่? (ข้อมูลตัวอย่างจะกลับมาเมื่อรีเฟรช)')) {
                localStorage.removeItem('allOrders');
                loadOrders();
            }
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
